---
name: airflow-teradata-main-systemtest-dashboard
on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to run system tests on (defaults to main)'
        required: false
        default: 'main'
      skip_csae:
        description: 'Skip CSAE environment creation and system tests (for pipeline testing only)'
        required: false
        default: false
        type: boolean
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  teradata-systemtest:
    name: "Manage Teradata Provider System Tests Dashboard"
    runs-on: "ubuntu-22.04"
    timeout-minutes: 120
    steps:
      - name: Cleanup workspace
        run: docker run -v "${GITHUB_WORKSPACE}:/workspace" -u 0:0 bash -c "rm -rf /workspace/*"

      - name: "Checkout branch"
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch || 'main' }}

      - name: "Checkout support scripts and test history from teradata-workflows"
        run: |
          git fetch origin teradata-workflows
          git checkout origin/teradata-workflows -- .github/workflows/scripts/createTestEnvironments.sh
          git checkout origin/teradata-workflows -- .github/workflows/scripts/deleteTestEnvironments.sh
          git checkout origin/teradata-workflows -- .github/workflows/system-tests-files/report_generate_index_html.py
          git checkout origin/teradata-workflows -- .github/workflows/system-tests-files/report_index_template.html
          git checkout origin/teradata-workflows -- .github/workflows/system-tests-files/report_parse_xml.py

          # Pull test history CSV from docs/test-results (new location to avoid workflow permission issues)
          if git checkout origin/teradata-workflows -- docs/test-results/reporttest.csv 2>/dev/null; then
            echo "INFO: Loaded existing test history from docs/test-results/reporttest.csv"
          else
            echo "INFO: No existing test history found, initializing new reporttest.csv"
            touch reporttest.csv
          fi

          cp .github/workflows/system-tests-files/report_generate_index_html.py .
          cp .github/workflows/system-tests-files/report_index_template.html .
          cp .github/workflows/system-tests-files/report_parse_xml.py .

      - name: "Install uv and report generation dependencies"
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          # Install jinja2 into system Python so report scripts work even when
          # the full uv sync (Airflow install) is skipped (skip_csae=true).
          pip3 install --quiet jinja2

      - name: "Define CSAE environment name"
        if: inputs.skip_csae != true
        id: define-environment-name
        run: echo "env-name=airflow-ci-$(date +%s%N)" >> $GITHUB_OUTPUT

      - name: "Create CSAE environment"
        if: inputs.skip_csae != true
        id: create-csae-environment
        shell: bash
        run: |
          echo "ClearScape environment: ${{ steps.define-environment-name.outputs.env-name }}"
          chmod +x .github/workflows/scripts/createTestEnvironments.sh
          .github/workflows/scripts/createTestEnvironments.sh
        env:
          CSAE_TOKEN: ${{ secrets.CSAE_AIRFLOW_TOKEN }}
          CSAE_ENV_PASSWORD: ${{ secrets.CSAE_AIRFLOW_ENV_PASSWORD }}
          CSAE_ENV_NAME: ${{ steps.define-environment-name.outputs.env-name }}

      - name: "Install Airflow Teradata Provider and run system tests"
        if: |
          steps.create-csae-environment.outcome == 'success' ||
          inputs.skip_csae == true
        run: |
          echo "::group::Workflow Configuration"
          if [ "${{ inputs.skip_csae }}" == "true" ]; then
            echo "::notice title=Test Mode::CSAE environment creation SKIPPED - using fallback configuration"
          elif [ "${{ steps.create-csae-environment.outcome }}" == "success" ]; then
            echo "::notice title=Test Mode::CSAE environment created successfully"
          fi
          echo "::endgroup::"

          export AIRFLOW_HOME=~/airflow
          mkdir -p $AIRFLOW_HOME

          sudo apt-get update -q
          sudo apt-get install -y apt-transport-https apt-utils build-essential ca-certificates dirmngr \
            freetds-bin freetds-dev git graphviz graphviz-dev krb5-user ldap-utils libev4 libev-dev \
            libffi-dev libgeos-dev libkrb5-dev libldap2-dev libleveldb1d libleveldb-dev libsasl2-2 \
            libsasl2-dev libsasl2-modules libssl-dev libxmlsec1 libxmlsec1-dev locales lsb-release \
            openssh-client pkgconf sasl2-bin software-properties-common sqlite3 sudo unixodbc \
            unixodbc-dev zlib1g-dev python3-venv python3-pip pipx default-libmysqlclient-dev \
            libxml2-dev libxmlsec1-openssl libtool krb5-multidev gcc g++

          # Install provider and shared workspace members
          uv sync --extra teradata --extra microsoft.azure --extra amazon
          # Install devel-common so tests_common.pytest_plugin (--system flag) is available
          uv sync --project providers/teradata --group dev

          # Unique ID per run to avoid DAG ID collisions if runs overlap
          export SYSTEM_TESTS_ENV_ID=teradatasystemtest-$(date +%s)

          # Use CSAE environment if available, otherwise use fallback environment variables
          if [ "${{ steps.create-csae-environment.outcome }}" == "success" ]; then
            echo "Using CSAE environment"
            export AIRFLOW_CONN_TERADATA_DEFAULT='teradata://${{ vars.CSAE_AIRFLOW_ENV_USERNAME }}:${{ secrets.CSAE_AIRFLOW_ENV_PASSWORD }}@${{ steps.create-csae-environment.outputs.teradata-server-name }}:/${{ vars.CSAE_AIRFLOW_ENV_DATABASE }}'
            export AIRFLOW_CONN_SSH_DEFAULT='ssh://${{ vars.CSAE_AIRFLOW_ENV_USERNAME }}:${{ secrets.CSAE_AIRFLOW_ENV_PASSWORD }}@${{ steps.create-csae-environment.outputs.teradata-server-name }}:/${{ vars.CSAE_AIRFLOW_ENV_DATABASE }}'
            export AIRFLOW_CONN_TERADATA_SSL_DEFAULT='teradata://${{ vars.CSAE_AIRFLOW_ENV_USERNAME }}:${{ secrets.CSAE_AIRFLOW_ENV_PASSWORD }}@${{ steps.create-csae-environment.outputs.teradata-server-name }}:/${{ vars.CSAE_AIRFLOW_ENV_DATABASE }}?sslmode=allow'
            export AIRFLOW_CONN_TERADATA_SP_CALL='teradata://${{ vars.CSAE_AIRFLOW_ENV_USERNAME }}:${{ secrets.CSAE_AIRFLOW_ENV_PASSWORD }}@${{ steps.create-csae-environment.outputs.teradata-server-name }}:/${{ vars.CSAE_AIRFLOW_ENV_DATABASE }}?tmode=TERA'
          elif [ "${{ inputs.skip_csae }}" == "true" ]; then
            echo "CSAE skipped - using fallback configuration from repository variables"
            export AIRFLOW_CONN_TERADATA_DEFAULT='${{ vars.FALLBACK_AIRFLOW_CONN_TERADATA_DEFAULT }}'
            export AIRFLOW_CONN_SSH_DEFAULT='${{ vars.FALLBACK_AIRFLOW_CONN_SSH_DEFAULT }}'
            export AIRFLOW_CONN_TERADATA_SSL_DEFAULT='${{ vars.FALLBACK_AIRFLOW_CONN_TERADATA_SSL_DEFAULT }}'
            export AIRFLOW_CONN_TERADATA_SP_CALL='${{ vars.FALLBACK_AIRFLOW_CONN_TERADATA_SP_CALL }}'
          fi
          export AIRFLOW_CONN_TERADATA_LAKE='teradata://${{ vars.LAKE_ENV_USERNAME }}:${{ secrets.LAKE_ENV_PASSWORD }}@${{ vars.LAKE_SERVER_NAME }}:/${{ vars.LAKE_ENV_USERNAME }}'
          export AIRFLOW_CONN_WASB_DEFAULT='wasb://${{ vars.AZURE_BLOB_ACCOUNTNAME }}:${{ secrets.AZURE_BLOB_ACCOUNT_SECRET_KEY_URI }}@'
          export AIRFLOW_CONN_AWS_DEFAULT=aws://${{ vars.AWS_ACCESS_KEY_ID }}:${{ secrets.AWS_SECRET_ACCESS_KEY }}@/?aws_session_token=${{ secrets.AWS_SESSION_TOKEN }}
          export AIRFLOW_VAR_AZURE_BLOB_ACCOUNTNAME=${{ vars.AZURE_BLOB_ACCOUNTNAME }}
          export AIRFLOW_VAR_AZURE_BLOB_ACCOUNT_SECRET_KEY=${{ secrets.AZURE_BLOB_ACCOUNT_SECRET_KEY }}
          export AIRFLOW_VAR_AWS_ACCESS_KEY_ID=${{ secrets.TERADATA_DOWNLOAD_AWS_SECRET_ACCESS_ID }}
          export AIRFLOW_VAR_AWS_SECRET_ACCESS_KEY=${{ secrets.TERADATA_DOWNLOAD_AWS_SECRET_ACCESS_KEY }}
          export AIRFLOW__CORE__LOAD_PLUGINS=false

          # Initialize Airflow database (required for tests)
          uv run airflow db migrate

          echo "::group::System Test Suite Information"
          echo "Running 5 system tests that do NOT require external infrastructure:"
          echo "  ✅ example_teradata.py - Basic Teradata operations"
          echo "  ✅ example_teradata_call_sp.py - Stored procedure execution"
          echo "  ✅ example_ssl_teradata.py - SSL/TLS connections"
          echo "  ✅ example_teradata_to_teradata_transfer.py - Teradata-to-Teradata data transfer"
          echo "  ✅ example_azure_blob_to_teradata_transfer.py - Azure Blob Storage integration"
          echo ""
          echo "Skipped tests (require unavailable infrastructure):"
          echo "  ⏭️  example_remote_bteq.py - Requires SSH connection"
          echo "  ⏭️  example_remote_tpt.py - Requires SSH connection"
          echo "  ⏭️  example_tpt.py - Requires SSH connection"
          echo "  ⏭️  example_bteq.py - Requires SSH connection"
          echo "  ⏭️  example_s3_to_teradata_transfer.py - Requires S3 setup"
          echo "  ⏭️  example_teradata_compute_cluster.py - Requires Teradata Lake"
          echo "::endgroup::"

          # Run system tests but skip those requiring external infrastructure
          # Use pytest deselect to exclude tests that need SSH, S3, Lake, TPT, BTEQ
          uv run pytest --system --no-db-cleanup --junitxml=report_test.xml \
            --deselect providers/teradata/tests/system/teradata/example_remote_bteq.py \
            --deselect providers/teradata/tests/system/teradata/example_remote_tpt.py \
            --deselect providers/teradata/tests/system/teradata/example_tpt.py \
            --deselect providers/teradata/tests/system/teradata/example_bteq.py \
            --deselect providers/teradata/tests/system/teradata/example_s3_to_teradata_transfer.py \
            --deselect providers/teradata/tests/system/teradata/example_teradata_compute_cluster.py \
            providers/teradata/tests/system/teradata/example_*.py

      - name: "Delete CSAE environment"
        if: always() && inputs.skip_csae != true
        run: |
          chmod +x .github/workflows/scripts/deleteTestEnvironments.sh
          .github/workflows/scripts/deleteTestEnvironments.sh
        env:
          CSAE_TOKEN: ${{ secrets.CSAE_AIRFLOW_TOKEN }}
          CSAE_ENV_NAME: ${{ steps.define-environment-name.outputs.env-name }}

      - name: "Parse test results and generate HTML dashboard"
        if: always()
        env:
          BRANCH_NAME: ${{ inputs.branch || 'main' }}
        run: |
          echo "::group::Test Results Processing"
          python3 report_parse_xml.py
          python3 report_generate_index_html.py
          mkdir -p teradata_report
          cp index.html teradata_report/index.html

          echo ""
          echo "Test execution summary:"
          cat reporttest.csv
          echo "::endgroup::"

          # Check if tests passed
          if grep -q "FAILED\|FAIL" reporttest.csv 2>/dev/null; then
            echo "::warning title=Test Results::Some tests failed - check the HTML report for details"
          else
            echo "::notice title=Test Results::All available tests PASSED! ✅"
          fi

      - name: "Persist updated test history CSV to teradata-workflows branch"
        if: always()
        run: |
          set -e  # Exit on error

          # Validate CSV before persisting
          if [ -f reporttest.csv ]; then
            CSV_LINES=$(wc -l < reporttest.csv)
            echo "INFO: CSV file has $CSV_LINES lines"

            # Check for corrupted lines (should have 4 fields minimum)
            INVALID_LINES=$(awk -F',' 'NF < 4 {print NR}' reporttest.csv | wc -l || true)
            if [ "$INVALID_LINES" -gt 0 ]; then
              echo "WARNING: Found $INVALID_LINES invalid CSV lines, will be cleaned by report_parse_xml.py"
            fi
          else
            echo "ERROR: reporttest.csv not found!"
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin teradata-workflows

          git worktree add /tmp/tw-worktree origin/teradata-workflows

          # Store CSV in docs directory (not .github/workflows) to avoid permission issues
          mkdir -p /tmp/tw-worktree/docs/test-results
          cp reporttest.csv /tmp/tw-worktree/docs/test-results/reporttest.csv
          echo "INFO: Copied reporttest.csv to docs/test-results/"

          cd /tmp/tw-worktree
          git add docs/test-results/reporttest.csv

          if git diff --staged --quiet; then
            echo "INFO: No changes to CSV — skipping commit"
          else
            git commit -m "ci: update system test results [skip ci]"
            if git push origin HEAD:teradata-workflows; then
              echo "INFO: Successfully pushed test results to teradata-workflows"
            else
              echo "WARNING: Failed to push to teradata-workflows (may have permission issues)"
            fi
          fi

          cd "$GITHUB_WORKSPACE"
          git worktree remove /tmp/tw-worktree

          echo "INFO: Test history persistence completed"

      - name: "Build GitHub Pages site"
        if: always()
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./teradata_report
          destination: ./_site

      - name: "Upload GitHub Pages artifact"
        if: always()
        uses: actions/upload-pages-artifact@v3

      - name: "Deploy to GitHub Pages"
        if: always()
        id: deployment
        uses: actions/deploy-pages@v4
