---
name: airflow-teradata-teradata_main-systemtest
on:
  push:
    branches:
      - main
  schedule:
  - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: write
  pages: write
  id-token: write
jobs:
  teradata-systemtest:
    name: "Manage Teradata Provider System Tests Dashboard"
    runs-on: "ubuntu-22.04"
    container:
      image: python:3.10-slim
      options: --user root
    steps:
      - name: "Checkout Teradata Airflow Source Code"
        uses: actions/checkout@v4
        with:
          ref: main
          persist-credentials: false
      - name: "Checkout ClearScape Scripts and Report Generation supported files"
        run: |
            ls
            git fetch
            
              
              



